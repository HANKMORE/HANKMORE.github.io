<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feliz Cumpleaños</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-image: url('fondo.jpg');
            background-size: cover;
            background-position: center;
            font-family: 'Special Elite', serif;
        }

        #overlay-inicio {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #fff1f5;
            z-index: 9000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            cursor: pointer;
        }

        /* CAPA DE MENSAJES */
        .capa-mensajes-fijos {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 8000;
        }

        #msg-arriba, #msg-abajo {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            text-align: center;
            opacity: 0;
            /* La transición de opacidad ahora es un poco más rápida para que desaparezca bien al hacer click */
            transition: opacity 0.5s ease; 
        }

        #msg-arriba { top: 7vh; }
        #msg-abajo { bottom: 7vh; }

        .linea-texto { font-size: 2.2rem; font-weight: bold; margin: 2px 0; }
        .color-azul { color: #1a5fb4; text-shadow: 1px 1px 2px white; }
        .color-celeste { color: #87CEEB; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }

        .escena {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            position: relative;
            z-index: 100;
        }

        #arbol-master {
            width: 600px; height: 600px;
            position: relative;
            transform-origin: center center;
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tronco-img { position: absolute; width: 100%; height: 100%; object-fit: contain; bottom: 0; z-index: 5; }
        .flor-png { position: absolute; background-image: url('flor.png'); background-size: contain; background-repeat: no-repeat; opacity: 0; z-index: 8; }

        /* FOTOS */
        .foto-marquito {
            position: absolute; width: 100px; padding: 5px;
            background: white; border-radius: 2px;
            box-shadow: 2px 5px 15px rgba(0,0,0,0.3);
            opacity: 0; transform: scale(0.5);
            transition: all 0.8s ease; z-index: 500;
        }
        .foto-marquito img { width: 100%; display: block; }

        #f1 { top: 8%; left: 21%; }
        #f2 { top: 8%; right: 21%; }
        #f3 { bottom: 20%; left: 25%; }
        #f4 { bottom: 20%; right: 25%; }

        .texto-foto {
            position: absolute; width: 140px; font-size: 1rem;
            color: #1a5fb4; background: rgba(255, 255, 255, 0.98);
            padding: 8px; border-radius: 5px; opacity: 0;
            border: 2px solid #87CEEB; text-align: center;
            left: 50%; transform: translateX(-50%); bottom: 100%;
        }

        .foto-activa .texto-foto { opacity: 1; }
        .mostrar-msg { opacity: 1 !important; }
        .ocultar-temp { opacity: 0 !important; } /* Clase para ocultar temporalmente */

        @media (max-width: 800px) {
            #arbol-master { transform: scale(0.65); }
            .linea-texto { font-size: 1.8rem; }
        }

        /* ZOOMS */
        .zoom1 { transform: scale(1.8) translate(15%, 15%) !important; }
        .zoom2 { transform: scale(1.8) translate(-15%, 15%) !important; }
        .zoom3 { transform: scale(1.8) translate(15%, -5%) !important; }
        .zoom4 { transform: scale(1.8) translate(-15%, -5%) !important; }

        .pétalo-viento { position: absolute; background-image: url('flor.png'); background-size: contain; z-index: 20; pointer-events: none; }
        @keyframes animacionViento { 0% { transform: translate(0, 0) rotate(0deg); opacity: 0; } 20% { opacity: 0.8; } 100% { transform: translate(-600px, 600px) rotate(-720deg); opacity: 0; } }
    </style>
</head>
<body>

    <div id="overlay-inicio">
        <div style="font-size: 60px; margin-bottom: 20px;">👀</div>
        <div style="font-size: 1.5rem; color: #1a5fb4; font-weight: bold;">TOCA PARA VE</div>
    </div>

    <audio id="musica-fondo" loop>
        <source src="musica.ogg" type="audio/ogg">
    </audio>

    <div class="capa-mensajes-fijos">
        <div id="msg-arriba">
            <div class="linea-texto color-celeste">FELIZ</div>
            <div class="linea-texto color-azul">CUMPLEAÑOS</div>
        </div>
        <div id="msg-abajo">
            <div class="linea-texto color-azul">CAMILITA</div>
            <div class="linea-texto color-celeste">TQM ❤️</div>
        </div>
    </div>

    <div class="escena">
        <div id="arbol-master" style="opacity: 0;">
            <img src="arbol.png" class="tronco-img">
            <div id="contenedor-flores" style="position: absolute; width:100%; height:100%;"></div>

            <div class="foto-marquito" id="f1" onclick="activarZoom(1)"><img src="pic1.jpg"><div class="texto-foto">Eres la mejor! ✨</div></div>
            <div class="foto-marquito" id="f2" onclick="activarZoom(2)"><img src="pic2.jpg"><div class="texto-foto">Pasa bomba con rafa xD</div></div>
            <div class="foto-marquito" id="f3" onclick="activarZoom(3)"><img src="pic3.jpg"><div class="texto-foto">Te quiero mucho 💙</div></div>
            <div class="foto-marquito" id="f4" onclick="activarZoom(4)"><img src="pic4.jpg"><div class="texto-foto">Por más años juntos 🎂</div></div>
        </div>
    </div>

    <script>
        const arbol = document.getElementById('arbol-master');
        const contenedorFlores = document.getElementById('contenedor-flores');
        const musica = document.getElementById('musica-fondo');
        const overlay = document.getElementById('overlay-inicio');
        const msgArriba = document.getElementById('msg-arriba');
        const msgAbajo = document.getElementById('msg-abajo');
        let bloqueado = true;

        overlay.addEventListener('click', () => {
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 1000);
            musica.play();
            iniciarAnimaciones();
        });

        function crearCorazon() {
            const totalFlores = 800; 
            const fragmento = document.createDocumentFragment();
            for (let i = 0; i < totalFlores; i++) {
                let t = Math.random() * 2 * Math.PI;
                let r = Math.sqrt(Math.random()); 
                const x = 16 * Math.pow(Math.sin(t), 3); 
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                const posX = 300 + (x * r * 12); 
                const posY = 150 + (y * r * 12); 
                const flor = document.createElement("div");
                flor.className = "flor-png";
                flor.style.left = posX + "px";
                flor.style.top = posY + "px";
                const size = Math.random() * 12 + 12; 
                flor.style.width = size + "px"; flor.style.height = size + "px";
                flor.style.transform = `rotate(${Math.random() * 360}deg) scale(0)`;
                fragmento.appendChild(flor);
            }
            contenedorFlores.appendChild(fragmento);
        }

        function iniciarAnimaciones() {
            crearCorazon();
            setTimeout(() => { arbol.style.opacity = "1"; }, 500);

            setTimeout(() => {
                const flores = document.querySelectorAll('.flor-png');
                flores.forEach((f, i) => {
                    setTimeout(() => {
                        f.style.opacity = "1";
                        f.style.transform = f.style.transform.replace('scale(0)', 'scale(1)');
                    }, i * 1.5); 
                });
            }, 2000);

            setTimeout(secuenciaIntro, 5000);
        }

        function secuenciaIntro() {
            const tiempos = [0, 3000, 6000, 9000];
            // Durante la intro, nos aseguramos de que los mensajes NO se vean
            msgArriba.classList.add('ocultar-temp');
            msgAbajo.classList.add('ocultar-temp');

            for(let i=1; i<=4; i++) {
                setTimeout(() => {
                    limpiarTextos();
                    arbol.className = `zoom${i}`;
                    const el = document.getElementById(`f${i}`);
                    el.style.opacity = "1"; el.style.transform = "scale(1)";
                    el.classList.add('foto-activa');
                }, tiempos[i-1]);
            }
            
            setTimeout(() => {
                arbol.className = "";
                limpiarTextos();
                bloqueado = false;
                iniciarViento();
                // Al terminar la intro, quitamos la ocultación temporal y mostramos los mensajes
                msgArriba.classList.remove('ocultar-temp');
                msgAbajo.classList.remove('ocultar-temp');
                msgArriba.classList.add('mostrar-msg');
                msgAbajo.classList.add('mostrar-msg');
            }, 12500);
        }

        function limpiarTextos() {
            document.querySelectorAll('.foto-marquito').forEach(f => f.classList.remove('foto-activa'));
        }

        function activarZoom(num) {
            if(bloqueado) return;
            limpiarTextos();
            
            if(arbol.className === `zoom${num}`) {
                // Si quitamos el zoom (volvemos al árbol completo)
                arbol.className = "";
                msgArriba.classList.remove('ocultar-temp');
                msgAbajo.classList.remove('ocultar-temp');
            } else {
                // Si activamos el zoom en una foto
                arbol.className = `zoom${num}`;
                document.getElementById(`f${num}`).classList.add('foto-activa');
                // OCULTAMOS los mensajes mientras se ve la foto
                msgArriba.classList.add('ocultar-temp');
                msgAbajo.classList.add('ocultar-temp');
            }
        }

        function iniciarViento() {
            setInterval(() => {
                const p = document.createElement("div");
                p.className = "pétalo-viento";
                p.style.left = (Math.random() * 500 + 50) + "px";
                p.style.top = (Math.random() * 400 + 50) + "px";
                const size = Math.random() * 15 + 10;
                p.style.width = size + "px"; p.style.height = size + "px";
                p.style.animation = `animacionViento ${Math.random() * 3 + 4}s linear forwards`;
                arbol.appendChild(p);
                setTimeout(() => p.remove(), 7000);
            }, 250);
        }

        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                musica.pause();
            } else {
                if (overlay.style.display === 'none') {
                    musica.play();
                }
            }
        });
    </script>
</body>
</html>
