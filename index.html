<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feliz Cumpleaños</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-image: url('fondo.jpg');
            background-size: cover;
            background-position: center;
            font-family: 'Special Elite', serif;
        }

        #overlay-inicio {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #fff1f5;
            z-index: 3000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            cursor: pointer;
        }

        .escena {
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column; /* Orientación vertical */
            justify-content: space-around; 
            align-items: center;
            position: relative;
        }

        /* --- MENSAJES ARRIBA Y ABAJO --- */
        .contenedor-mensajes-v {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 2s ease;
            z-index: 1500;
            text-align: center;
        }

        .linea-texto {
            font-size: 2.2rem;
            font-weight: bold;
            margin: 5px 0;
        }

        .color-azul { color: #1a5fb4; text-shadow: 1px 1px 2px white; }
        .color-celeste { color: #87CEEB; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }

        /* --- CONTENEDOR DEL ÁRBOL --- */
        #arbol-master {
            width: 600px; /* Tamaño base para el cálculo */
            height: 600px;
            position: relative;
            transform-origin: center center;
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .tronco-img {
            position: absolute; width: 100%; height: 100%;
            object-fit: contain; bottom: 0; z-index: 5;
        }

        .flor-png {
            position: absolute;
            background-image: url('flor.png'); 
            background-size: contain; background-repeat: no-repeat;
            opacity: 0; z-index: 8;
        }

        /* --- FOTOS Y TEXTOS ARRIBA --- */
        .foto-marquito {
            position: absolute; width: 100px; padding: 5px;
            background: white; border-radius: 2px;
            box-shadow: 2px 5px 15px rgba(0,0,0,0.3);
            opacity: 0; transform: scale(0.5);
            transition: all 0.8s ease; z-index: 500;
        }
        .foto-marquito img { width: 100%; display: block; }

        .texto-foto {
            position: absolute; width: 140px; font-size: 1rem;
            color: #1a5fb4; background: rgba(255, 255, 255, 0.98);
            padding: 8px; border-radius: 5px; opacity: 0;
            border: 2px solid #87CEEB;
            transition: opacity 0.4s ease;
            text-align: center;
            left: 50%; transform: translateX(-50%);
            bottom: 115%; /* SIEMPRE ARRIBA DE LA FOTO */
            z-index: 2000 !important;
            pointer-events: none;
        }

        .foto-activa .texto-foto { opacity: 1; }

        /* --- RESPONSIVE CELULAR --- */
        @media (max-width: 800px) {
            #arbol-master { transform: scale(0.6); } /* Árbol más grande */
            .linea-texto { font-size: 1.8rem; }
        }

        .mostrar-msg { opacity: 1 !important; }

        /* ZOOM AJUSTADO PARA CELULAR */
        .zoom1 { transform: scale(1.8) translate(15%, 15%) !important; }
        .zoom2 { transform: scale(1.8) translate(-15%, 15%) !important; }
        .zoom3 { transform: scale(1.8) translate(15%, -5%) !important; }
        .zoom4 { transform: scale(1.8) translate(-15%, -5%) !important; }

        #f1 { top: 10%; left: 20%; }
        #f2 { top: 10%; right: 20%; }
        #f3 { bottom: 45%; left: 18%; }
        #f4 { bottom: 45%; right: 18%; }

        .pétalo-viento {
            position: absolute; background-image: url('flor.png');
            background-size: contain; z-index: 4;
            animation: viento-izq linear forwards;
        }

        @keyframes viento-izq {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            100% { transform: translate(-800px, 400px) rotate(-720deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="overlay-inicio">
        <div style="font-size: 60px; margin-bottom: 20px;">👀</div>
        <div style="font-size: 1.5rem; color: #1a5fb4; font-weight: bold;">TOCA PARA VER</div>
    </div>

    <audio id="musica-fondo" loop>
        <source src="musica.ogg" type="audio/ogg">
    </audio>

    <div class="escena">
        
        <!-- MENSAJE SUPERIOR -->
        <div id="msg-arriba" class="contenedor-mensajes-v">
            <div class="linea-texto color-celeste">FELIZ</div>
            <div class="linea-texto color-azul">CUMPLEAÑOS</div>
        </div>

        <!-- ÁRBOL CENTRAL -->
        <div id="arbol-master" style="opacity: 0;">
            <img src="arbol.png" class="tronco-img">
            <div id="contenedor-flores" style="position: absolute; width:100%; height:100%;"></div>

            <div class="foto-marquito" id="f1" onclick="activarZoom(1)">
                <img src="pic1.jpg">
                <div class="texto-foto">Eres la mejor! ✨</div>
            </div>
            <div class="foto-marquito" id="f2" onclick="activarZoom(2)">
                <img src="pic2.jpg">
                <div class="texto-foto">Te quiero mucho 💙</div>
            </div>
            <div class="foto-marquito" id="f3" onclick="activarZoom(3)">
                <img src="pic3.jpg">
                <div class="texto-foto">Siempre juntos ❀</div>
            </div>
            <div class="foto-marquito" id="f4" onclick="activarZoom(4)">
                <img src="pic4.jpg">
                <div class="texto-foto">Por más años así 🎂</div>
            </div>
        </div>

        <!-- MENSAJE INFERIOR -->
        <div id="msg-abajo" class="contenedor-mensajes-v">
            <div class="linea-texto color-azul">CAMILITA</div>
            <div class="linea-texto color-celeste">TQM ❤️</div>
        </div>

    </div>

    <script>
        const arbol = document.getElementById('arbol-master');
        const contenedor = document.getElementById('contenedor-flores');
        const musica = document.getElementById('musica-fondo');
        const overlay = document.getElementById('overlay-inicio');
        let bloqueado = true;

        overlay.addEventListener('click', () => {
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 1000);
            musica.play();
            iniciarAnimaciones();
        });

        function crearCorazon() {
            const totalFlores = 1000; 
            const fragmento = document.createDocumentFragment();
            for (let i = 0; i < totalFlores; i++) {
                let t = Math.random() * 2 * Math.PI;
                let r = Math.sqrt(Math.random()); 
                const x = 16 * Math.pow(Math.sin(t), 3); 
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                const posX = 300 + (x * r * 14); 
                const posY = 250 + (y * r * 14); 
                const flor = document.createElement("div");
                flor.className = "flor-png";
                flor.style.left = posX + "px";
                flor.style.top = posY + "px";
                const size = Math.random() * 12 + 12; 
                flor.style.width = size + "px"; flor.style.height = size + "px";
                flor.style.transform = `rotate(${Math.random() * 360}deg) scale(0)`;
                fragmento.appendChild(flor);
            }
            contenedor.appendChild(fragmento);
        }

        function iniciarAnimaciones() {
            crearCorazon();
            setTimeout(() => { arbol.style.opacity = "1"; }, 500);

            setTimeout(() => {
                const flores = document.querySelectorAll('.flor-png');
                flores.forEach((f, i) => {
                    setTimeout(() => {
                        f.style.opacity = "1";
                        f.style.transform = f.style.transform.replace('scale(0)', 'scale(1)');
                    }, i * 1); 
                });
            }, 2000);

            setTimeout(secuenciaIntro, 5000);
        }

        function secuenciaIntro() {
            const tiempos = [0, 3000, 6000, 9000];
            for(let i=1; i<=4; i++) {
                setTimeout(() => {
                    limpiarTextos();
                    arbol.className = `zoom${i}`;
                    const el = document.getElementById(`f${i}`);
                    el.style.opacity = "1"; el.style.transform = "scale(1)";
                    el.classList.add('foto-activa');
                }, tiempos[i-1]);
            }
            setTimeout(() => {
                arbol.className = "";
                limpiarTextos();
                bloqueado = false;
                iniciarViento();
                document.getElementById('msg-arriba').classList.add('mostrar-msg');
                document.getElementById('msg-abajo').classList.add('mostrar-msg');
            }, 12500);
        }

        function limpiarTextos() {
            document.querySelectorAll('.foto-marquito').forEach(f => f.classList.remove('foto-activa'));
        }

        function activarZoom(num) {
            if(bloqueado) return;
            limpiarTextos();
            if(arbol.className === `zoom${num}`) {
                arbol.className = "";
            } else {
                arbol.className = `zoom${num}`;
                document.getElementById(`f${num}`).classList.add('foto-activa');
            }
        }

        function iniciarViento() {
            setInterval(() => {
                const p = document.createElement("div");
                p.className = "pétalo-viento";
                p.style.left = (200 + Math.random() * 200) + "px";
                p.style.top = (150 + Math.random() * 200) + "px";
                const size = Math.random() * 10 + 8;
                p.style.width = size + "px"; p.style.height = size + "px";
                arbol.appendChild(p);
                setTimeout(() => p.remove(), 6000);
            }, 150); 
        }
    </script>
</body>
</html>
